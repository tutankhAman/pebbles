name = "pebbles-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "COLLAB_DOCUMENT", class_name = "CollabDocument" },
  { name = "METADATA_STORE", class_name = "MetadataStore" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollabDocument", "MetadataStore"]
